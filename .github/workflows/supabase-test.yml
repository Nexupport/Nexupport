name: Supabase Test

on: pull_request

permissions:
  pull-requests: write

jobs:
  generate-types:
    runs-on: ubuntu-latest

    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start Database
        run: supabase db start

      - name: Install GitHub CLI
        run: sudo apt-get update && sudo apt-get install -y gh

      - name: Generate types and suggest changes
        run: |
          supabase gen types typescript --local > src/lib/types/db.ts
          
          if ! git diff --quiet src/lib/types/db.ts; then
            echo "Detected changes in src/lib/types/db.ts. Posting a code suggestion..."
          
            if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
              git diff -U0 src/lib/types/db.ts | \
              awk '/^@@/ {split($0,a," "); split(a[2],b,","); start=b[1]; print start} /^+/ && !/^+++/ {print substr($0,2)}' \
              > tmp.diff
          
              NEW_CONTENT=$(cat tmp.diff | sed 's/\\/\\\\/g; s/`/\\`/g')
          
              gh pr comment ${{ github.event.pull_request.number }} \
                --body "The generated types are out of date. Apply this update:\n\`\`\`suggestion\n$NEW_CONTENT\n\`\`\`"
            fi
          
            exit 1
          fi

  test-db:
    runs-on: ubuntu-latest

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      PROJECT_ID: ${{ secrets.PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start Database
        run: supabase db start

      - name: Test Database
        run: supabase test db